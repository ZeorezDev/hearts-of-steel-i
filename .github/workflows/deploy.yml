name: Deploy to GitHub Pages

# main/master dalına her push'ta otomatik derleme + dağıtım yapar.
# Ayrıca Actions sekmesinden elle de çalıştırılabilir (workflow_dispatch).
on:
  push:
    branches: [main, master]
  workflow_dispatch:

# GitHub Pages dağıtımı için gerekli izinler
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek bir dağıtım çalışsın; yeni push gelirse beklemedekini iptal etme.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
